<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Philips Briefing Form</title>
    <script>
      (function redirectToSpaEntry(location) {
        var pathSegmentsToKeep = location.hostname.endsWith('github.io') ? 1 : 0
        var pathSegments = location.pathname.split('/')
        var appBase = pathSegments.slice(0, 1 + pathSegmentsToKeep).join('/') + '/'
        var routePath = pathSegments
          .slice(1 + pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~')
        var routeQuery = location.search
          ? '&' + location.search.slice(1).replace(/&/g, '~and~')
          : ''

        location.replace(
          location.protocol + '//' + location.hostname +
          (location.port ? ':' + location.port : '') +
          appBase + '?/' + routePath + routeQuery + location.hash
        )
      })(window.location)
    </script>
  </head>
  <body></body>
</html>
